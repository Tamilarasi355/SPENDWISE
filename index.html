<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendWise - Sign In</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <header class="auth-header">
      <h1 class="logo">SpendWise</h1>
      <p class="tagline">Track expenses. Manage budgets. Stay in control.</p>
    </header>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="login">Sign In</button>
      <button type="button" class="auth-tab" data-tab="register">Register</button>
    </div>

    <div class="auth-forms">
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required placeholder="••••••••">
        </div>
        <div id="login-error" class="form-error" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="register-name">Name</label>
          <input type="text" id="register-name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" name="password" required minlength="6" placeholder="Min 6 characters">
        </div>
        <div id="register-error" class="form-error" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
    </div>
  </div>

  <script src="js/app.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
</body>
</html>
